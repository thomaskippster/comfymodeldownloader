name: Maven Release Build

# This lets you trigger the build manually from the GitHub Actions tab
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release Version (e.g., 1.0.0)'
        required: true
      developmentVersion:
        description: 'Next Dev Version (e.g., 1.0.1-SNAPSHOT)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    
    # Crucial: Give the action permission to push commits and tags back to the repo
    permissions:
      contents: write
      packages: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # You need to fetch all history so the release plugin can see tags
          fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Change this to your Java version
          distribution: 'temurin'
          server-id: github # Must match the <id> in your distributionManagement
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Configure Git User
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Perform Maven Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B release:prepare release:perform \
            -DreleaseVersion=${{ github.event.inputs.releaseVersion }} \
            -DdevelopmentVersion=${{ github.event.inputs.developmentVersion }}
